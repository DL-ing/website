<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="“校帮递”大学生校园跑腿代取服务平台 - 轻量化、校园专属的跑腿代取信息对接平台">
  <meta name="theme-color" content="#4F6EF7">
  <title>校帮递 - 校园跑腿代取服务平台</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ========== 应用容器 ========== -->
  <div class="app-container" id="app">

    <!-- 顶部导航 -->
    <header class="header">
      <a class="header-logo" href="#" onclick="switchTab('hall');return false;">
        <span class="logo-icon">🏃</span>
        校帮递
      </a>
      <div class="header-actions">
        <button class="header-btn" id="headerBell" title="消息通知" style="position:relative;">
          🔔
          <span class="notif-count" id="notifBadge" style="display:none;">0</span>
        </button>
      </div>
    </header>

    <!-- 主内容区 -->
    <main class="main-content">

      <!-- ===== 页面1：任务大厅 ===== -->
      <section class="page-section active" id="hallSection">
        <div class="filter-bar">
          <span class="filter-chip active" data-filter="all">全部任务</span>
          <span class="filter-chip" data-filter="pending">待接单</span>
          <span class="filter-chip" data-filter="urgent">🔥 紧急</span>
          <span class="filter-chip" data-filter="low-price">💰 低价优先</span>
          <span class="filter-chip" data-filter="high-price">💎 高价优先</span>
        </div>
        <div id="hallContent">
          <!-- 动态渲染 -->
        </div>
      </section>

      <!-- ===== 页面2：发布任务 ===== -->
      <section class="page-section" id="publishSection">
        <div id="publishContent">
          <!-- 动态渲染 -->
        </div>
      </section>

      <!-- ===== 页面3：我的订单 ===== -->
      <section class="page-section" id="ordersSection">
        <div id="ordersContent">
          <!-- 动态渲染 -->
        </div>
      </section>

      <!-- ===== 页面4：用户中心 ===== -->
      <section class="page-section" id="userSection">
        <div id="userCenterContent">
          <!-- 动态渲染 -->
        </div>
      </section>

    </main>

    <!-- 底部导航栏 -->
    <nav class="bottom-nav">
      <button class="nav-item active" id="navHall">
        <span class="nav-icon">🏠</span>
        <span>任务大厅</span>
      </button>
      <button class="nav-item" id="navPublish">
        <span class="nav-icon">✏️</span>
        <span>发布任务</span>
      </button>
      <button class="nav-item" id="navOrders">
        <span class="nav-icon">📋</span>
        <span>我的订单</span>
      </button>
      <button class="nav-item" id="navUser">
        <span class="nav-icon">👤</span>
        <span>个人中心</span>
      </button>
    </nav>

  </div>

  <!-- JavaScript -->
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
